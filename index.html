<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Vital Joy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
min-height:100%;
margin:0;
padding:0;
overflow-x:hidden;
}

body{
color:#333;
line-height:1.8;
}

.page-bg{
width:100%;
min-height:100vh;
min-height:100dvh;
height:auto;
background-image:url('images/body-bg.jpg');
background-size:cover;
background-position:center bottom;
background-repeat:no-repeat;
position:relative;
z-index:1;
}

.browser-frame-wrap{
width:100%;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
position:relative;
z-index:2;
}

.browser-frame{
width:100%;
max-width:1100px;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
position:relative;
transition:opacity 0.4s ease, transform 0.4s ease;
}

.browser-header{
background:#ffffff;
padding:12px 16px;
display:flex;
align-items:center;
gap:10px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
}
.dot1{background:#4285F4;}
.dot2{background:#34A853;}
.dot3{background:#9C27B0;}
.dot4{background:#FBBC05;}

/* ========== 修正：锁定图片尺寸，禁止横向拉伸溢出 ========== */
.browser-header-logo{
height:22px;
max-width:200px;  /* 限制最大宽度，不会横向撑爆 */
width:auto;
margin-left:12px;
object-fit:contain;
background:transparent !important;
border:none !important;
outline:none !important;
display:block;
}

.top-banner{
width:100%;
height:70vh;
min-height:450px;
position:relative;
background-image:url('images/banner.jpg');
background-size:cover;
background-position:center;
}

.banner-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6));
z-index:1;
}

.banner-content{
position:absolute;
bottom:40px;
left:35px;
z-index:2;
}

/* ========== 修正：限制Banner Logo最大宽度 ========== */
.banner-top-logo{
height:60px;
max-width:320px;  /* 限制最大宽度，原图再大也不会溢出 */
width:auto;
margin-bottom:20px;
object-fit:contain;
background:transparent !important;
border:none !important;
outline:none !important;
display:block;
}

.top-banner h1{
font-size:clamp(28px,5vw,40px);
color:#fff;
margin-bottom:15px;
text-align:left;
}

.top-banner p{
font-size:18px;
color:#fff;
margin-bottom:25px;
text-align:left;
}

.button{
display:inline-block;
padding:14px 35px;
background:#6b8e5a;
color:white;
border-radius:30px;
text-decoration:none;
transition:0.2s;
}

.button:hover{
opacity:0.85;
}

.page-content{
position:relative;
z-index:3;
max-width:900px;
margin:0 auto;
padding:60px 25px;
}

section{
margin-bottom:60px;
}

h2{
color:#4b3828;
margin-bottom:35px;
text-align:left;
font-size:26px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.85);
padding:25px;
border-radius:15px;
text-align:left;
box-shadow:0 2px 12px rgba(0,0,0,0.08);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
}

.card h3{
color:#6b8e5a;
margin-bottom:15px;
}

.product-card{
display:flex;
gap:30px;
align-items:center;
flex-wrap:wrap;
justify-content:flex-start;
background:rgba(255,255,0.85);
padding:30px;
border-radius:20px;
box-shadow:0 2px 12px rgba(0,0,0,0.08);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
}

.product-card img{
width:100%;
max-width:350px;
border-radius:15px;
}

.product-card div{
flex:1;
min-width:280px;
}

.product-card h3{
color:#4b3828;
margin-bottom:15px;
}

.contact-card{
background:rgba(255,255,255,0.85);
padding:30px;
border-radius:20px;
box-shadow:0 2px 12px rgba(0,0,0,0.08);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
}

.contact-card a{
color:#4b3828;
text-decoration:none;
margin-right:12px;
}
.contact-card a:hover{
color:#6b8e5a;
text-decoration:underline;
}

footer{
position:relative;
z-index:3;
background:#4b3828;
color:white;
text-align:center;
padding:25px;
}

.scroll-item{
opacity:0;
transition:all 0.7s ease-out;
}
.from-left{
transform:translateX(-80px);
}
.from-right{
transform:translateX(80px);
}
.from-top{
transform:translateY(60px);
}
.scroll-item.active{
opacity:1;
transform:translate(0,0);
}

@media(max-width:768px){
.browser-frame-wrap{
padding:20px 10px;
}
.page-content{
padding:30px 20px;
}
.product-card{
padding:20px;
}
}

</style>

</head>

<body>

<div class="page-bg">

    <div class="browser-frame-wrap">
        <div class="browser-frame" id="browserBox">
            <div class="browser-header">
                <span class="dot dot1"></span>
                <span class="dot dot2"></span>
                <span class="dot dot3"></span>
                <span class="dot dot4"></span>
                <!-- 顶部文字Logo -->
                <img class="browser-header-logo" src="images/brand-text.png" alt="Vital Joy">
            </div>

            <div class="top-banner">
                <div class="banner-overlay"></div>
                <div class="banner-content">
                    <!-- Banner主Logo -->
                    <img class="banner-top-logo" src="images/brand-logo.png" alt="Vital Joy Logo">
                    <h1>VITAL JOY</h1>
                    <p>天然豆腐猫砂<br>快速结团 · 强力除臭 · 低粉尘</p>
                    <a class="button" href="#">了解更多</a>
                </div>
            </div>
        </div>
    </div>

    <div class="page-content">

        <section class="scroll-item from-left">
            <h2>为什么选择我们</h2>
            <div class="cards">
                <div class="card">
                    <h3>🌱 天然豆腐</h3>
                    <p>采用植物纤维制作，环保又安心。</p>
                </div>
                <div class="card">
                    <h3>⚡ 快速结团</h3>
                    <p>快速吸收，减少碎团。</p>
                </div>
                <div class="card">
                    <h3>🌬️ 低粉尘</h3>
                    <p>减少粉尘飞扬，保护猫咪呼吸。</p>
                </div>
                <div class="card">
                    <h3>✨ 强效除臭</h3>
                    <p>帮助保持猫砂盆清新。</p>
                </div>
            </div>
        </section>

        <section class="scroll-item from-right">
            <h2>产品介绍</h2>
            <div class="product-card">
                <img src="images/product.jpg" alt="Product">
                <div>
                    <h3>Tofu Cat Litter</h3>
                    <p>重量：6L</p>
                    <p>适合：
                    <br>🐱 家庭猫咪
                    <br>🐱 多猫家庭
                    <br>🐱 猫舍
                    <br>🐱 宠物寄宿中心
                    </p>
                </div>
            </div>
        </section>

        <section class="scroll-item from-top">
            <h2>产品细节</h2>
            <div class="product-card">
                <img src="images/detail.jpg" alt="Detail">
                <div>
                    <p>天然豆腐原料<br><br>快速结团<br><br>低粉尘设计<br><br>方便清理</p>
                </div>
            </div>
        </section>

        <section class="scroll-item from-left">
            <h2>联系我们</h2>
            <div class="contact-card">
                <a href="https://wa.me/601111099372" target="_blank">WhatsApp</a>｜
                <a href="https://www.instagram.com/vital__joy" target="_blank">Instagram</a>｜
                <a href="#" target="_blank">Facebook</a>｜
                <a href="https://my.shp.ee/SGdVbjsT" target="_blank">Shopee</a>
            </div>
        </section>

    </div>

    <footer>
        © 2026 Vital Joy
    </footer>

</div>

<script>
const browserBox = document.getElementById('browserBox');

window.addEventListener('scroll', () => {
const scrollY = window.scrollY;
const boxHeight = browserBox.offsetHeight;

if(scrollY < boxHeight){
let opacity = 1 - (scrollY / boxHeight) * 1.2;
let scale = 1 - (scrollY / boxHeight) * 0.05;
browserBox.style.opacity = Math.max(opacity, 0);
browserBox.style.transform = `scale(${scale})`;
}else{
browserBox.style.opacity = 0;
browserBox.style.transform = 'scale(0.9)';
}
});

const scrollItems = document.querySelectorAll('.scroll-item');

function animateScroll(){
    scrollItems.forEach(item=>{
        const rect = item.getBoundingClientRect();
        const enter = window.innerHeight * 0.85;
        const leave = -100;

        if(rect.top < enter && rect.bottom > leave){
            item.classList.add('active');
        }else{
            item.classList.remove('active');
        }
    })
}

window.addEventListener('scroll',animateScroll);
window.addEventListener('load',animateScroll);
</script>

</body>
</html>
