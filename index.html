<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vital Joy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#faf8f2;
color:#333;
line-height:1.8;
}

.top-banner{
position:relative;
width:100%;
height:75vh;
min-height:500px;
background-image:url('images/banner.jpg');
background-size:cover;
background-position:center;
transition:opacity 0.4s ease, transform 0.4s ease;
display:flex;
align-items:flex-end;
padding:40px 25px;
}

.top-banner-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.65));
z-index:1;
}

.top-banner-content{
position:relative;
z-index:2;
max-width:900px;
width:100%;
margin:0 auto;
}

.top-banner h1{
font-size:clamp(28px,5vw,40px);
color:#fff;
margin-bottom:15px;
text-align:left;
}

.top-banner p{
font-size:18px;
color:#fff;
margin-bottom:25px;
text-align:left;
}

.button{
display:inline-block;
padding:14px 35px;
background:#6b8e5a;
color:white;
border-radius:30px;
text-decoration:none;
transition:0.2s;
}

.button:hover{
opacity:0.85;
}

.page-content{
max-width:900px;
margin:auto;
padding:50px 25px;
}

section{
margin-bottom:60px;
}

h2{
color:#4b3828;
margin-bottom:35px;
text-align:left;
font-size:26px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
text-align:left;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card h3{
color:#6b8e5a;
margin-bottom:15px;
}

.product{
display:flex;
gap:30px;
align-items:center;
flex-wrap:wrap;
justify-content:flex-start;
}

.product img{
width:100%;
max-width:350px;
border-radius:20px;
}

.product div{
flex:1;
min-width:280px;
}

.product h3{
color:#4b3828;
margin-bottom:15px;
}

.contact{
text-align:left;
}

footer{
background:#4b3828;
color:white;
text-align:center;
padding:25px;
}

@media(max-width:768px){
.top-banner{
padding:30px 20px;
}

.page-content{
padding:30px 20px;
}
}

</style>

</head>

<body>

<div class="top-banner" id="topBanner">
<div class="top-banner-overlay"></div>
<div class="top-banner-content">
<h1>VITAL JOY</h1>
<p>天然豆腐猫砂<br>快速结团 · 强力除臭 · 低粉尘</p>
<a class="button" href="#">了解更多</a>
</div>
</div>

<div class="page-content">

<section>
<h2>为什么选择我们</h2>
<div class="cards">

<div class="card">
<h3>🌱 天然豆腐</h3>
<p>采用植物纤维制作，环保又安心。</p>
</div>

<div class="card">
<h3>⚡ 快速结团</h3>
<p>快速吸收，减少碎团。</p>
</div>

<div class="card">
<h3>🌬️ 低粉尘</h3>
<p>减少粉尘飞扬，保护猫咪呼吸。</p>
</div>

<div class="card">
<h3>✨ 强效除臭</h3>
<p>帮助保持猫砂盆清新。</p>
</div>

</div>
</section>

<section>
<h2>产品介绍</h2>
<div class="product">

<img src="images/product.jpg" alt="Product">

<div>
<h3>Tofu Cat Litter</h3>
<p>重量：6L</p>
<p>适合：
<br>🐱 家庭猫咪
<br>🐱 多猫家庭
<br>🐱 猫舍
<br>🐱 宠物寄宿中心
</p>
</div>

</div>
</section>

<section>
<h2>产品细节</h2>
<div class="product">

<img src="images/detail.jpg" alt="Detail">

<div>
<p>天然豆腐原料<br><br>快速结团<br><br>低粉尘设计<br><br>方便清理</p>
</div>

</div>
</section>

<section class="contact">
<h2>联系我们</h2>
<p>WhatsApp ｜ Instagram ｜ Shopee</p>
</section>

</div>

<footer>
© 2026 Vital Joy
</footer>

<script>
const topBanner = document.getElementById('topBanner');

window.addEventListener('scroll', () => {
const scrollY = window.scrollY;
const bannerHeight = topBanner.offsetHeight;

if(scrollY < bannerHeight){
const opacity = 1 - (scrollY / bannerHeight) * 1.3;
const scale = 1 - (scrollY / bannerHeight) * 0.06;
topBanner.style.opacity = Math.max(opacity, 0);
topBanner.style.transform = `scale(${scale})`;
}else{
topBanner.style.opacity = 0;
topBanner.style.transform = 'scale(0.94)';
}
});
</script>

</body>
</html>
